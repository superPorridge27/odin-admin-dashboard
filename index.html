<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Admin Page</title>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-title">
                <div class="menu-item">
                    <img src="img/view-dashboard.svg" alt="Dashboard">
                    <h1>Dashboard</h1>
                </div>
            </div>
            
            <div class="sidebar-feat">
                <div class="menu-item">
                    <img src="img/home.svg" alt="Home">
                    <h1>Home</h1>
                </div>
                <div class="menu-item">
                    <img src="img/card-account-details-outline.svg" alt="Profile">
                    <h1>Profile</h1>
                </div>
                <div class="menu-item">
                    <img src="img/message-reply-outline.svg" alt="Messages">

                </div>

                    <img src="img/clock-time-three-outline.svg" alt="History">

                    <img src="img/file-document-multiple-outline.svg" alt="Tasks">

                </div>
                <div class="menu-item">
                    <img src="img/account-group.svg" alt="Communities">
                    <h1>Communities</h1>
                </div>
            </div>

                <div class="menu-item">
                    <img src="img/cog.svg" alt="Settings">
                    <h1>Settings</h1>
                </div>
                <div class="menu-item">
                    <img src="img/help.svg" alt="Support">
                    <h1>Support</h1>
                </div>
                <div class="menu-item">
                    <img src="img/shield-check-outline.svg" alt="Privacy">
                    <h1>Privacy</h1>
                </div>

        </div>
        <div class="main">
            <div class="header">

            </div>
            <div class="content">

                </div>

            </div>
        </div>
